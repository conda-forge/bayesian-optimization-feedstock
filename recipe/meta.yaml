{% set name = "bayesian-optimization" %}
{% set version = "3.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 75a1d8be78b862dd8a75944622a52956f8b3f0c3c2db43284c87e0347aac78e9

build:
  number: 0
  noarch: python
  script: '{{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv '

requirements:
  host:
    - pip
    - python {{ python_min }}
    - uv-build
  run:
    - numpy >=1.25
    - python >={{ python_min }},<4
    - scikit-learn >=1.0.0, <2.0.0
    - scipy >=1.0.0, <2.0.0
    - colorama >=0.4.6, <1.0.0
    - packaging

test:
  requires:
    - python {{ python_min }}
  imports:
    - bayes_opt

about:
  home: https://github.com/fmfn/BayesianOptimization
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: Pure Python implementation of bayesian global optimization with gaussian processes.
  doc_url: https://github.com/fmfn/BayesianOptimization
  dev_url: https://github.com/fmfn/BayesianOptimization

extra:
  recipe-maintainers:
    - bwheelz36
    - till-m
    - volpatto
